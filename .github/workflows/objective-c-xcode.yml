name: Full Build and Package

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup FxPlug SDK
        run: |
          sudo mkdir -p /Library/Developer/SDKs
          # 直接使用 git clone，比 curl 稳定得多
          git clone --depth 1 https://github.com/tony-scialdone/FxPlug4-SDK-Mirror.git FxPlugSource
          # 将解压出来的 SDK 移入系统搜索路径
          sudo cp -R FxPlugSource/* /Library/Developer/SDKs/FxPlug.sdk/
          echo "✅ FxPlug SDK 挂载完毕"

      - name: Build All Schemes
        run: |
          # 自动获取项目里所有的 Scheme 并执行编译
          # 这样你不用担心漏掉任何一个插件组件
          xcodebuild -list -project Source/Gyroflow.xcodeproj | awk '/Schemes:/{flag=1; next} flag && !NF{flag=0} flag{$1=$1; print}' | while read -r SCHEME; do
            echo "🔨 正在编译: $SCHEME"
            xcodebuild build \
              -project Source/Gyroflow.xcodeproj \
              -scheme "$SCHEME" \
              -configuration Release \
              -derivedDataPath build_output \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY=""
          done

      - name: Create Package
        run: |
          # 把所有编译出来的产物统一塞进一个文件夹，然后打包
          mkdir -p final_package
          find build_output/Build/Products/Release -maxdepth 1 \( -name "*.pluginkit" -o -name "*.app" \) -exec cp -R {} final_package/ \;
          cd final_package && zip -r ../Gyroflow_Complete_Build.zip .

      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: Gyroflow-Toolbox-Release
          path: Gyroflow_Complete_Build.zip
